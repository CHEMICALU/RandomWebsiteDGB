<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GameHub Marketplace</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  background: #0d1117;
  color: #e1e8f0;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #11181f;
  border-bottom: 1px solid #27303f;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
}

/* SHOP SECTION */
.shop-section {
  background: #f4f5f7;
  color: #111;
  padding: 40px 20px;
}

.shop-container {
  max-width: 1100px;
  margin: auto;
}

.shop-title {
  font-size: 28px;
  margin-bottom: 25px;
}

/* Category icons row */
.category-row {
  display: flex;
  gap: 40px;
  align-items: center;
  margin-bottom: 30px;
}

.category {
  text-align: center;
  color: #6b7280;
  cursor: pointer;
  transition: 0.2s;
}

.category-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #e5e7eb;
  margin: auto;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.category.active .category-icon {
  background: #facc15;
  color: #111;
}

.category.active {
  color: #111;
  font-weight: bold;
}

/* Search + filter bar */
.shop-controls {
  display: flex;
  gap: 20px;
}

.shop-controls input,
.shop-controls select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: white;
  font-size: 14px;
  outline: none;
}

.shop-controls input {
  flex: 1;
}

.section {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

.section h2 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}

.card {
  background: #1f2937;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-4px);
  background: #111827;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">GameHub</div>
</div>

<!-- SHOP SECTION -->
<div class="shop-section">
  <div class="shop-container">

    <div class="shop-title">Shop</div>

    <div class="category-row">
      <div class="category">
        <div class="category-icon">💰</div>
        Currency (0)
      </div>

      <div class="category">
        <div class="category-icon">🛡</div>
        Accounts (29)
      </div>

      <div class="category active">
        <div class="category-icon">⚔</div>
        Items (60)
      </div>

      <div class="category">
        <div class="category-icon">⚡</div>
        Top Ups (0)
      </div>

      <div class="category">
        <div class="category-icon">🎁</div>
        Gift Cards (0)
      </div>
    </div>

    <div class="shop-controls">
      <input type="text" placeholder="Search offers">
      <select>
        <option>All Games</option>
        <option>Minecraft</option>
        <option>Roblox</option>
        <option>DonutSMP</option>
      </select>
    </div>

  </div>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Featured Items</h2>
  <div class="grid">
    <div class="card">DONUTSMP</div>
    <div class="card">ROBUX</div>
    <div class="card">MINECRAFT</div>
    <div class="card">ROBLOX</div>
  </div>
</div>

</body>
</html>
