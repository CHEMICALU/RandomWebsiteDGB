<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GameHub Marketplace</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #ffffff; /* Entire page white now */
  color: #111;
}

/* NAVBAR */
.navbar {
  background: #11181f;
  border-bottom: 1px solid #27303f;
  padding: 15px 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
}

/* SHOP SECTION */
.shop-section {
  background: #ffffff;
  padding: 40px 0;
}

.shop-title {
  font-size: 28px;
  margin-bottom: 25px;
}

.category-row {
  display: flex;
  gap: 40px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.category {
  text-align: center;
  color: #6b7280;
  cursor: pointer;
}

.category-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #e5e7eb;
  margin: auto;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.category.active .category-icon {
  background: #facc15;
}

.category.active {
  color: #111;
  font-weight: bold;
}

/* SEARCH + FILTER */
.shop-controls {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.shop-controls input,
.shop-controls select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: white;
  font-size: 14px;
  height: 44px;
}

.shop-controls input {
  flex: 1;
}

/* PRODUCTS */
.products {
  padding: 30px 0;
  background: #ffffff; /* White instead of black */
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: #f3f4f6;
  border-radius: 14px;
  padding: 40px;
  cursor: pointer;
  transition: 0.25s;
  display: flex;
  align-items: center;
  gap: 15px;
}

.card:hover {
  background: #e5e7eb;
  transform: translateY(-5px);
}

/* 🔥 UPDATED IMAGE SIZE */
.card img {
  width: 100px;
  height: 100px;
  object-fit: contain;
}

.card-title {
  font-size: 32px;
  font-weight: 600;
}

.empty {
  color: #6b7280;
  font-style: italic;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="container">
    <div class="logo">GameHub</div>
  </div>
</div>

<!-- SHOP -->
<div class="shop-section">
  <div class="container">
    <div class="shop-title">Shop</div>

    <div class="category-row">
      <div class="category active" onclick="switchCategory('currency', this)">
        <div class="category-icon">💰</div>
        Currency
      </div>

      <div class="category" onclick="switchCategory('accounts', this)">
        <div class="category-icon">🛡</div>
        Accounts
      </div>

      <div class="category" onclick="switchCategory('items', this)">
        <div class="category-icon">⚔</div>
        Items
      </div>

      <div class="category" onclick="switchCategory('giftcards', this)">
        <div class="category-icon">🎁</div>
        Gift Cards
      </div>
    </div>

    <div class="shop-controls">
      <input type="text" id="searchInput" placeholder="Search offers" onkeyup="renderProducts()">
      <select id="dynamicFilter" onchange="renderProducts()"></select>
    </div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="products">
  <div class="container">
    <div class="grid" id="productGrid"></div>
  </div>
</div>

<script>
const data = {
  currency: [
    { name: "Robux", type: "roblox", image: "robux.png", link: "https://yourlink.com/robux" },
    { name: "DonutSMP", type: "minecraft", image: "donutsmp.png", link: "https://yourlink.com/donutsmp" }
  ],
  accounts: [
    { name: "Roblox Account", type: "roblox", image: "robloxacc.png", link: "https://yourlink.com/roblox-account" },
    { name: "Minecraft Account", type: "minecraft", image: "mcacc.png", link: "https://yourlink.com/minecraft-account" }
  ],
  items: [
    { name: "Path of Exile Chaos Orbs", type: "pathofexile", image: "poe.png", link: "https://yourlink.com/poe" },
    { name: "Grand Piece Online Fruit", type: "gpo", image: "gpo.png", link: "https://yourlink.com/gpo" }
  ],
  giftcards: [
    { name: "$1 Amazon", type: "amazon", image: "amazon.png", link: "https://yourlink.com/amazon1" },
    { name: "$5 Xbox", type: "xbox", image: "xbox.png", link: "https://yourlink.com/xbox5" }
  ]
};

let currentCategory = "currency";

function switchCategory(category, element) {
  currentCategory = category;

  document.querySelectorAll(".category").forEach(cat => {
    cat.classList.remove("active");
  });

  element.classList.add("active");
  updateFilter();
  renderProducts();
}

function updateFilter() {
  const filter = document.getElementById("dynamicFilter");
  filter.innerHTML = "";

  const types = [...new Set(data[currentCategory].map(item => item.type))];

  filter.innerHTML = "<option value='all'>All</option>";

  types.forEach(type => {
    filter.innerHTML += `<option value="${type}">${formatType(type)}</option>`;
  });
}

function formatType(type) {
  const names = {
    roblox: "Roblox",
    minecraft: "Minecraft",
    pathofexile: "Path of Exile",
    gpo: "Grand Piece Online",
    amazon: "Amazon",
    xbox: "Xbox"
  };
  return names[type] || type;
}

function renderProducts() {
  const grid = document.getElementById("productGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const filter = document.getElementById("dynamicFilter").value;

  grid.innerHTML = "";

  const items = data[currentCategory];
  let found = false;

  items.forEach(item => {
    const matchesType = filter === "all" || item.type === filter;
    const matchesSearch = item.name.toLowerCase().includes(search);

    if (matchesType && matchesSearch) {
      const div = document.createElement("div");
      div.className = "card";
      div.onclick = () => window.location.href = item.link;

      div.innerHTML = `
        <img src="${item.image}" alt="${item.name}">
        <div class="card-title">${item.name}</div>
      `;

      grid.appendChild(div);
      found = true;
    }
  });

  if (!found) {
    grid.innerHTML = "<div class='empty'>No matching results.</div>";
  }
}

updateFilter();
renderProducts();
</script>

</body>
</html>
