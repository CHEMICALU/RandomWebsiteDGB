<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Market</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* Navbar */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 40px;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
}

.menu {
  display: flex;
  gap: 25px;
  font-size: 14px;
  color: #cbd5e1;
}

.menu span {
  cursor: pointer;
  transition: 0.2s;
}

.menu span:hover {
  color: #38bdf8;
}

/* Search */
.search-container {
  text-align: center;
  margin: 40px 0 20px;
}

.search-container input {
  width: 400px;
  max-width: 90%;
  padding: 12px 18px;
  border-radius: 50px;
  border: none;
  font-size: 15px;
  background: #1e293b;
  color: white;
  outline: none;
  border: 1px solid #334155;
}

.search-container input:focus {
  border-color: #38bdf8;
}

/* Games Section */
.section {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.section h2 {
  margin-bottom: 25px;
  font-weight: 500;
  color: #e2e8f0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  cursor: pointer;
  transition: 0.25s ease;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #38bdf8;
  background: #0f172a;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">GameMarket</div>
  <div class="menu">
    <span>Currency</span>
    <span>Accounts</span>
    <span>Items</span>
    <span>Boosting</span>
  </div>
</div>

<div class="search-container">
  <input type="text" id="searchBar" placeholder="Search games..." onkeyup="searchGames()">
</div>

<div class="section">
  <h2>Popular Games</h2>
  <div class="grid">
    <div class="card">DONUTSMP</div>
    <div class="card">ROBUX</div>
    <div class="card">MINECRAFT</div>
    <div class="card">ROBLOX</div>
  </div>
</div>

<script>
function searchGames() {
  const input = document.getElementById("searchBar").value.toUpperCase();
  const cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    const text = cards[i].textContent || cards[i].innerText;
    if (text.toUpperCase().indexOf(input) > -1) {
      cards[i].classList.remove("hidden");
    } else {
      cards[i].classList.add("hidden");
    }
  }
}
</script>

</body>
</html>
