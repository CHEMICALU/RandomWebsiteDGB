<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GameHub Marketplace</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  background: #0d1117;
  color: #e1e8f0;
}

/* NAVBAR */
.navbar {
  padding: 15px 40px;
  background: #11181f;
  border-bottom: 1px solid #27303f;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
}

/* SHOP SECTION */
.shop-section {
  background: #f4f5f7;
  color: #111;
  padding: 40px 20px;
}

.shop-container {
  max-width: 1100px;
  margin: auto;
}

.shop-title {
  font-size: 28px;
  margin-bottom: 25px;
}

.category-row {
  display: flex;
  gap: 40px;
  margin-bottom: 30px;
}

.category {
  text-align: center;
  color: #6b7280;
  cursor: pointer;
  transition: 0.2s;
}

.category-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #e5e7eb;
  margin: auto;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.category.active .category-icon {
  background: #facc15;
  color: #111;
}

.category.active {
  color: #111;
  font-weight: bold;
}

/* Controls */
.shop-controls {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.shop-controls input,
.shop-controls select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: white;
  font-size: 14px;
  outline: none;
}

.shop-controls input { flex: 1; }

/* PRODUCTS */
.products {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}

.card {
  background: #1f2937;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-4px);
  background: #111827;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">GameHub</div>
</div>

<div class="shop-section">
  <div class="shop-container">
    <div class="shop-title">Shop</div>

    <div class="category-row">
      <div class="category" onclick="switchCategory('currency', this)">
        <div class="category-icon">💰</div>
        Currency (2)
      </div>

      <div class="category" onclick="switchCategory('accounts', this)">
        <div class="category-icon">🛡</div>
        Accounts (2)
      </div>

      <div class="category active" onclick="switchCategory('items', this)">
        <div class="category-icon">⚔</div>
        Items (2)
      </div>

      <div class="category" onclick="switchCategory('topups', this)">
        <div class="category-icon">⚡</div>
        Top Ups (2)
      </div>

      <div class="category" onclick="switchCategory('giftcards', this)">
        <div class="category-icon">🎁</div>
        Gift Cards (2)
      </div>
    </div>

    <div class="shop-controls">
      <input type="text" id="searchInput" placeholder="Search offers" onkeyup="filterProducts()">
      <select>
        <option>All Games</option>
        <option>Minecraft</option>
        <option>Roblox</option>
        <option>DonutSMP</option>
      </select>
    </div>
  </div>
</div>

<div class="products">
  <div class="grid" id="productGrid"></div>
</div>

<script>
const data = {
  currency: ["Robux Currency", "Minecraft Coins"],
  accounts: ["Minecraft Account", "Roblox Account"],
  items: ["DonutSMP Sword", "Roblox Limited Item"],
  topups: ["Robux Top Up", "Minecraft Rank Upgrade"],
  giftcards: ["Roblox Gift Card", "Minecraft Gift Card"]
};

let currentCategory = "items";

function renderProducts() {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";

  data[currentCategory].forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.textContent = item;
    grid.appendChild(div);
  });
}

function switchCategory(category, element) {
  currentCategory = category;

  document.querySelectorAll(".category").forEach(cat => {
    cat.classList.remove("active");
  });

  element.classList.add("active");
  renderProducts();
}

function filterProducts() {
  const input = document.getElementById("searchInput").value.toUpperCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = card.textContent.toUpperCase().includes(input)
      ? ""
      : "none";
  });
}

renderProducts();
</script>

</body>
</html>
